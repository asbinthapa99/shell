name: Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "asbinthapa99"
          git config user.email "asbinthapa27@gmail.com"

      - name: Fetch a random quote
        run: |
          RESPONSE=$(curl -sf https://zenquotes.io/api/random || echo "")
          if [ -n "$RESPONSE" ]; then
            QUOTE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['q'])")
            AUTHOR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['a'])")
          else
            QUOTE="Keep pushing forward, one commit at a time."
            AUTHOR="Unknown"
          fi
          echo "QUOTE=$QUOTE" >> "$GITHUB_ENV"
          echo "AUTHOR=$AUTHOR" >> "$GITHUB_ENV"

      - name: Update README
        run: |
          NOW=$(date '+%Y-%m-%d %H:%M:%S')
          HOUR=$(date '+%H')

          if [ "$HOUR" -lt 15 ]; then
            if [ -f "day_count.txt" ]; then
              DAY=$(cat day_count.txt)
              DAY=$((DAY + 1))
            else
              DAY=1
            fi
            echo $DAY > day_count.txt
            LABEL="Morning"
          else
            DAY=$(cat day_count.txt)
            LABEL="Evening"
          fi

          echo "DAY=$DAY" >> "$GITHUB_ENV"
          echo "NOW=$NOW" >> "$GITHUB_ENV"
          echo "LABEL=$LABEL" >> "$GITHUB_ENV"

          # Get total commits before writing
          TOTAL=$(git rev-list --count HEAD)

          # Add to commit log
          echo "| Day $DAY | $NOW | $LABEL | $QUOTE — $AUTHOR |" >> commit_log.txt

          # Build README line by line — no heredoc to avoid yaml/shell issues
          {
            echo "# Streak Tracker"
            echo ""
            echo "> Automatically updated twice daily. Every commit counts."
            echo ""
            echo "---"
            echo ""
            echo "## Stats"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Current Day** | Day $DAY |"
            echo "| **Last Updated** | $NOW UTC |"
            echo "| **Total Commits** | $TOTAL |"
            echo "| **Started** | 2026-02-17 |"
            echo ""
            echo "---"
            echo ""
            echo "## Quote of the Commit"
            echo ""
            echo "> $QUOTE"
            echo ">"
            echo "> — *$AUTHOR*"
            echo ""
            echo "---"
            echo ""
            echo "## Recent Commit Log"
            echo ""
            echo "| Day | Timestamp | Session | Quote |"
            echo "|-----|-----------|---------|-------|"
            tail -10 commit_log.txt
            echo ""
            echo "---"
            echo ""
            echo "*This repository is part of a daily consistency challenge. Powered by GitHub Actions.*"
          } > README.md

      - name: Commit and push
        run: |
          git add day_count.txt README.md commit_log.txt
          git diff --staged --quiet && exit 0
          git commit -m "Day $DAY | $LABEL | $QUOTE - $AUTHOR"
          git push https://asbinthapa99:${{ secrets.GH_PAT }}@github.com/asbinthapa99/shell.git HEAD:main
