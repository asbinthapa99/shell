name: Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "asbinthapa99"
          git config user.email "asbinthapa27@gmail.com"

      - name: Morning - increment day and get quote
        if: ${{ contains('0 9', github.event.schedule) || (github.event_name == 'workflow_dispatch') }}
        run: |
          HOUR=$(date '+%H')
          if [ "$HOUR" -lt 11 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -f "day_count.txt" ]; then
              DAY=$(cat day_count.txt)
              DAY=$((DAY + 1))
            else
              DAY=1
            fi
            echo $DAY > day_count.txt
            echo "DAY=$DAY" >> "$GITHUB_ENV"
            echo "LABEL=Morning" >> "$GITHUB_ENV"
            RESPONSE=$(curl -sf https://zenquotes.io/api/random || echo "")
            if [ -n "$RESPONSE" ]; then
              QUOTE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['q'])")
              AUTHOR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['a'])")
            else
              QUOTE="Keep pushing forward."
              AUTHOR="Unknown"
            fi
            echo "CONTENT_LABEL=Quote of the Day" >> "$GITHUB_ENV"
            echo "CONTENT_VALUE=$QUOTE - $AUTHOR" >> "$GITHUB_ENV"
            echo "COMMIT_MSG=Day $DAY | Morning | $QUOTE - $AUTHOR" >> "$GITHUB_ENV"
          fi

      - name: Determine session type
        run: |
          HOUR=$(date '+%H')
          NOW=$(date '+%Y-%m-%d %H:%M:%S')
          echo "NOW=$NOW" >> "$GITHUB_ENV"

          if [ -z "$DAY" ]; then
            DAY=$(cat day_count.txt)
            echo "DAY=$DAY" >> "$GITHUB_ENV"
          fi

          if [ "$HOUR" -ge 11 ] && [ "$HOUR" -lt 13 ]; then
            echo "SESSION=btc" >> "$GITHUB_ENV"
            echo "LABEL=Midday" >> "$GITHUB_ENV"
          elif [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 16 ]; then
            echo "SESSION=word" >> "$GITHUB_ENV"
            echo "LABEL=Afternoon" >> "$GITHUB_ENV"
          elif [ "$HOUR" -ge 16 ] && [ "$HOUR" -lt 19 ]; then
            echo "SESSION=btc" >> "$GITHUB_ENV"
            echo "LABEL=Evening" >> "$GITHUB_ENV"
          elif [ "$HOUR" -ge 19 ]; then
            echo "SESSION=word" >> "$GITHUB_ENV"
            echo "LABEL=Night" >> "$GITHUB_ENV"
          else
            echo "SESSION=morning" >> "$GITHUB_ENV"
          fi

      - name: Fetch Bitcoin price
        if: env.SESSION == 'btc'
        run: |
          DAY=$(cat day_count.txt)
          BTC_RESPONSE=$(curl -sf "https://api.coindesk.com/v1/bpi/currentprice/USD.json" || echo "")
          if [ -n "$BTC_RESPONSE" ]; then
            BTC_PRICE=$(echo "$BTC_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['bpi']['USD']['rate'])")
            BTC_TIME=$(echo "$BTC_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['time']['updated'])")
          else
            BTC_PRICE="N/A"
            BTC_TIME="unavailable"
          fi
          echo "CONTENT_LABEL=Bitcoin Price" >> "$GITHUB_ENV"
          echo "CONTENT_VALUE=BTC $BTC_PRICE USD as of $BTC_TIME" >> "$GITHUB_ENV"
          echo "COMMIT_MSG=Day $DAY | $LABEL | BTC $BTC_PRICE USD" >> "$GITHUB_ENV"

      - name: Fetch random word
        if: env.SESSION == 'word'
        run: |
          DAY=$(cat day_count.txt)
          WORD_RESPONSE=$(curl -sf "https://random-word-api.herokuapp.com/word" || echo "")
          if [ -n "$WORD_RESPONSE" ]; then
            WORD=$(echo "$WORD_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          else
            WORD="perseverance"
          fi
          DEF_RESPONSE=$(curl -sf "https://api.dictionaryapi.dev/api/v2/entries/en/$WORD" || echo "")
          if [ -n "$DEF_RESPONSE" ]; then
            DEFINITION=$(echo "$DEF_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['meanings'][0]['definitions'][0]['definition'])" 2>/dev/null || echo "No definition found.")
          else
            DEFINITION="No definition found."
          fi
          echo "CONTENT_LABEL=Word of the Session" >> "$GITHUB_ENV"
          echo "CONTENT_VALUE=$WORD - $DEFINITION" >> "$GITHUB_ENV"
          echo "COMMIT_MSG=Day $DAY | $LABEL | Word: $WORD - $DEFINITION" >> "$GITHUB_ENV"

      - name: Update README
        run: |
          DAY=$(cat day_count.txt)
          TOTAL=$(git rev-list --count HEAD)
          echo "| Day $DAY | $NOW | $LABEL | $CONTENT_VALUE |" >> commit_log.txt
          {
            echo "# Streak Tracker"
            echo ""
            echo "> Automatically updated 5 times daily. Every commit counts."
            echo ""
            echo "---"
            echo ""
            echo "## Stats"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Current Day** | Day $DAY |"
            echo "| **Last Updated** | $NOW UTC |"
            echo "| **Total Commits** | $TOTAL |"
            echo "| **Started** | 2026-02-17 |"
            echo ""
            echo "---"
            echo ""
            echo "## $CONTENT_LABEL"
            echo ""
            echo "> $CONTENT_VALUE"
            echo ""
            echo "---"
            echo ""
            echo "## Recent Commit Log"
            echo ""
            echo "| Day | Timestamp | Session | Content |"
            echo "|-----|-----------|---------|---------|"
            tail -10 commit_log.txt
            echo ""
            echo "---"
            echo ""
            echo "*Daily consistency challenge. Powered by GitHub Actions.*"
          } > README.md

      - name: Commit and push
        run: |
          git add day_count.txt README.md commit_log.txt
          git diff --staged --quiet && exit 0
          git commit -m "$COMMIT_MSG"
          git push https://asbinthapa99:${{ secrets.GH_PAT }}@github.com/asbinthapa99/shell.git HEAD:main
