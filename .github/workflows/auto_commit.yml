name: Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "asbinthapa99"
          git config user.email "asbinthapa27@gmail.com"

      - name: Fetch a random quote
        run: |
          RESPONSE=$(curl -sf https://zenquotes.io/api/random || echo "")
          if [ -n "$RESPONSE" ]; then
            QUOTE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['q'])")
            AUTHOR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['a'])")
          else
            QUOTE="Keep pushing forward, one commit at a time."
            AUTHOR="Unknown"
          fi
          echo "QUOTE=$QUOTE" >> "$GITHUB_ENV"
          echo "AUTHOR=$AUTHOR" >> "$GITHUB_ENV"

      - name: Update README
        run: |
          NOW=$(date '+%Y-%m-%d %H:%M:%S')
          HOUR=$(date '+%H')

          if [ "$HOUR" -lt 15 ]; then
            if [ -f "day_count.txt" ]; then
              DAY=$(cat day_count.txt)
              DAY=$((DAY + 1))
            else
              DAY=1
            fi
            echo $DAY > day_count.txt
            LABEL="🌅 Morning"
          else
            DAY=$(cat day_count.txt)
            LABEL="🌙 Evening"
          fi

          echo "DAY=$DAY" >> "$GITHUB_ENV"
          echo "NOW=$NOW" >> "$GITHUB_ENV"
          echo "LABEL=$LABEL" >> "$GITHUB_ENV"

          echo "| Day $DAY | $NOW | $LABEL | $QUOTE — $AUTHOR |" >> commit_log.txt

          cat > README.md << EOF
# 🔥 Streak Tracker

> Automatically updated twice daily. Every commit counts.

---

## 📊 Stats

| | |
|---|---|
| **Current Day** | Day $DAY |
| **Last Updated** | $NOW UTC |
| **Total Commits** | $(git rev-list --count HEAD) |
| **Started** | 2026-02-17 |

---

## 💬 Quote of the Commit

> "$QUOTE"
>
> — *$AUTHOR*

---

## 📅 Recent Commit Log

| Day | Timestamp | Session | Quote |
|-----|-----------|---------|-------|
EOF

          tail -10 commit_log.txt >> README.md

          cat >> README.md << EOF

---

*This repository is part of a daily consistency challenge. Powered by GitHub Actions.*
EOF

      - name: Commit and push
        run: |
          git add day_count.txt README.md commit_log.txt
          git diff --staged --quiet && exit 0
          git commit -m "Day $DAY | $LABEL | \"$QUOTE\" — $AUTHOR"
          git push https://asbinthapa99:${{ secrets.GH_PAT }}@github.com/asbinthapa99/shell.git HEAD:main
