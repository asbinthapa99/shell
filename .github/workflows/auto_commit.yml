name: Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "asbinthapa99"
          git config user.email "asbinthapa27@gmail.com"

      - name: Build commit content and update README
        run: |
          HOUR=$(date '+%H')
          NOW=$(date '+%Y-%m-%d %H:%M:%S')

          # ── Morning: increment day + quote ───────────────────────────────
          if [ "$HOUR" -lt 11 ]; then
            LABEL="Morning"
            if [ -f "day_count.txt" ]; then
              DAY=$(cat day_count.txt)
              DAY=$((DAY + 1))
            else
              DAY=1
            fi
            echo $DAY > day_count.txt
            RESPONSE=$(curl -sf https://zenquotes.io/api/random || echo "")
            if [ -n "$RESPONSE" ]; then
              QUOTE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['q'])")
              AUTHOR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d['a'])")
            else
              QUOTE="Keep pushing forward, one commit at a time."
              AUTHOR="Unknown"
            fi
            CONTENT_LABEL="Quote of the Day"
            CONTENT_VALUE="$QUOTE - $AUTHOR"
            COMMIT_MSG="Day $DAY | Morning | $QUOTE - $AUTHOR"
            BTC_PRICE="N/A"

          # ── Midday: bitcoin price ─────────────────────────────────────────
          elif [ "$HOUR" -lt 13 ]; then
            LABEL="Midday"
            DAY=$(cat day_count.txt)
            BTC=$(curl -sf "https://api.coindesk.com/v1/bpi/currentprice/USD.json" || echo "")
            if [ -n "$BTC" ]; then
              BTC_PRICE=$(echo "$BTC" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['bpi']['USD']['rate'])")
              BTC_TIME=$(echo "$BTC" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['time']['updated'])")
            else
              BTC_PRICE="unavailable"
              BTC_TIME="unavailable"
            fi
            QUOTE="Live Bitcoin price fetched from CoinDesk API"
            AUTHOR="CoinDesk"
            CONTENT_LABEL="Bitcoin Price"
            CONTENT_VALUE="BTC $BTC_PRICE USD as of $BTC_TIME"
            COMMIT_MSG="Day $DAY | Midday | BTC $BTC_PRICE USD"

          # ── Afternoon: random word ────────────────────────────────────────
          elif [ "$HOUR" -lt 16 ]; then
            LABEL="Afternoon"
            DAY=$(cat day_count.txt)
            WORD_RES=$(curl -sf "https://random-word-api.herokuapp.com/word" || echo "")
            if [ -n "$WORD_RES" ]; then
              WORD=$(echo "$WORD_RES" | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
            else
              WORD="perseverance"
            fi
            DEF_RES=$(curl -sf "https://api.dictionaryapi.dev/api/v2/entries/en/$WORD" || echo "")
            if [ -n "$DEF_RES" ]; then
              DEF=$(echo "$DEF_RES" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['meanings'][0]['definitions'][0]['definition'])" 2>/dev/null || echo "No definition found.")
            else
              DEF="No definition found."
            fi
            QUOTE="$WORD"
            AUTHOR="$DEF"
            CONTENT_LABEL="Word of the Session"
            CONTENT_VALUE="$WORD - $DEF"
            COMMIT_MSG="Day $DAY | Afternoon | Word: $WORD"
            BTC_PRICE="N/A"

          # ── Evening: bitcoin price ────────────────────────────────────────
          elif [ "$HOUR" -lt 19 ]; then
            LABEL="Evening"
            DAY=$(cat day_count.txt)
            BTC=$(curl -sf "https://api.coindesk.com/v1/bpi/currentprice/USD.json" || echo "")
            if [ -n "$BTC" ]; then
              BTC_PRICE=$(echo "$BTC" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['bpi']['USD']['rate'])")
              BTC_TIME=$(echo "$BTC" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['time']['updated'])")
            else
              BTC_PRICE="unavailable"
              BTC_TIME="unavailable"
            fi
            QUOTE="Live Bitcoin price fetched from CoinDesk API"
            AUTHOR="CoinDesk"
            CONTENT_LABEL="Bitcoin Price"
            CONTENT_VALUE="BTC $BTC_PRICE USD as of $BTC_TIME"
            COMMIT_MSG="Day $DAY | Evening | BTC $BTC_PRICE USD"

          # ── Night: random word ────────────────────────────────────────────
          else
            LABEL="Night"
            DAY=$(cat day_count.txt)
            WORD_RES=$(curl -sf "https://random-word-api.herokuapp.com/word" || echo "")
            if [ -n "$WORD_RES" ]; then
              WORD=$(echo "$WORD_RES" | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
            else
              WORD="consistency"
            fi
            DEF_RES=$(curl -sf "https://api.dictionaryapi.dev/api/v2/entries/en/$WORD" || echo "")
            if [ -n "$DEF_RES" ]; then
              DEF=$(echo "$DEF_RES" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['meanings'][0]['definitions'][0]['definition'])" 2>/dev/null || echo "No definition found.")
            else
              DEF="No definition found."
            fi
            QUOTE="$WORD"
            AUTHOR="$DEF"
            CONTENT_LABEL="Word of the Session"
            CONTENT_VALUE="$WORD - $DEF"
            COMMIT_MSG="Day $DAY | Night | Word: $WORD"
            BTC_PRICE="N/A"
          fi

          # ── Export all vars ───────────────────────────────────────────────
          echo "DAY=$DAY"                       >> "$GITHUB_ENV"
          echo "NOW=$NOW"                       >> "$GITHUB_ENV"
          echo "LABEL=$LABEL"                   >> "$GITHUB_ENV"
          echo "QUOTE=$QUOTE"                   >> "$GITHUB_ENV"
          echo "AUTHOR=$AUTHOR"                 >> "$GITHUB_ENV"
          echo "CONTENT_LABEL=$CONTENT_LABEL"   >> "$GITHUB_ENV"
          echo "CONTENT_VALUE=$CONTENT_VALUE"   >> "$GITHUB_ENV"
          echo "BTC_PRICE=$BTC_PRICE"           >> "$GITHUB_ENV"
          echo "COMMIT_MSG=$COMMIT_MSG"         >> "$GITHUB_ENV"

          # ── Write commit log ──────────────────────────────────────────────
          echo "| Day $DAY | $NOW | $LABEL | $CONTENT_VALUE |" >> commit_log.txt

          # ── Build README ──────────────────────────────────────────────────
          TOTAL=$(git rev-list --count HEAD)
          echo "TOTAL=$TOTAL" >> "$GITHUB_ENV"
          {
            echo "# Streak Tracker"
            echo ""
            echo "> Automatically updated 5 times daily. Every commit counts."
            echo ""
            echo "---"
            echo ""
            echo "## Stats"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Current Day** | Day $DAY |"
            echo "| **Last Updated** | $NOW UTC |"
            echo "| **Total Commits** | $TOTAL |"
            echo "| **Started** | 2026-02-17 |"
            echo "| **Live Page** | [asbinthapa99.github.io/shell](https://asbinthapa99.github.io/shell) |"
            echo ""
            echo "---"
            echo ""
            echo "## $CONTENT_LABEL"
            echo ""
            echo "> $CONTENT_VALUE"
            echo ""
            echo "---"
            echo ""
            echo "## Recent Commit Log"
            echo ""
            echo "| Day | Timestamp | Session | Content |"
            echo "|-----|-----------|---------|---------|"
            tail -10 commit_log.txt
            echo ""
            echo "---"
            echo ""
            echo "*Daily consistency challenge. Powered by GitHub Actions.*"
          } > README.md

      - name: Build GitHub Pages site
        run: |
          python3 build_page.py
        env:
          DAY: ${{ env.DAY }}
          NOW: ${{ env.NOW }}
          LABEL: ${{ env.LABEL }}
          QUOTE: ${{ env.QUOTE }}
          AUTHOR: ${{ env.AUTHOR }}
          CONTENT_LABEL: ${{ env.CONTENT_LABEL }}
          CONTENT_VALUE: ${{ env.CONTENT_VALUE }}
          BTC_PRICE: ${{ env.BTC_PRICE }}
          TOTAL: ${{ env.TOTAL }}

      - name: Commit and push
        run: |
          git add day_count.txt README.md commit_log.txt index.html
          git diff --staged --quiet && exit 0
          git commit -m "$COMMIT_MSG"
          git push https://asbinthapa99:${{ secrets.GH_PAT }}@github.com/asbinthapa99/shell.git HEAD:main
